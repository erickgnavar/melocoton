<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melocoton</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="/main.js" defer></script>
    <script>
      // Match the app's theme detection
      function resolveTheme(pref) {
        if (pref === 'system' || !pref)
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        return pref;
      }
      document.documentElement.setAttribute('data-theme', resolveTheme(localStorage.getItem('theme')));
    </script>
  </head>
  <body>
    <div class="splash">
      <div class="db-icons">
        <div class="db-icon db-postgres"><i class="fas fa-database"></i></div>
        <div class="db-icon db-mysql"><i class="fas fa-database"></i></div>
        <div class="db-icon db-sqlite"><i class="fas fa-file-alt"></i></div>
      </div>

      <div class="splash-text">
        <div class="title">Melocoton</div>
        <div class="subtitle">Database Client</div>
      </div>

      <div class="splash-progress">
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
        <div class="status">Loading</div>
      </div>
    </div>

    <div class="footer" id="version"></div>
    <script type="module">
      if (window.__TAURI__) {
        const { getVersion } = window.__TAURI__.app;
        getVersion().then(v => { document.getElementById('version').textContent = 'v' + v; });
      }
    </script>
  </body>
</html>
