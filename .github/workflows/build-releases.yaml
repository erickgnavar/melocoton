---
name: Build releases

on:
  push:
    tags: "*"

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          brew install rust xz mise
          mise install
          eval "$(mise activate bash)"
          mix local.hex --force && mix local.rebar --force

      - name: build project
        run: |
          bash build.sh
          version="${GITHUB_REF_NAME#v}"
          dmg_file=$(find src-tauri/target/release/bundle/dmg/ -type f -name "*.dmg")
          mv "$dmg_file" "melocoton-${version}.dmg"
          echo "dmg_file=melocoton-${version}.dmg" >> $GITHUB_ENV

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: ${{ env.dmg_file }}

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          curl https://mise.run | sh
          export PATH=$PATH:~/.local/bin/
          mise install
          eval "$(mise activate bash)"
          mix local.hex --force && mix local.rebar --force

      - name: build project
        run: |
          bash build.sh
          ls src-tauri/target/release/
          version="${GITHUB_REF_NAME#v}"
          deb_file=$(find src-tauri/target/release/bundle/deb/ -type f -name "*.deb")
          rpm_file=$(find src-tauri/target/release/bundle/rpm/ -type f -name "*.rpm")
          appimage_file=$(find src-tauri/target/release/bundle/appimage/ -type f -name "*.AppImage")
          mv "$deb_file" "melocoton-${version}.deb"
          echo "deb_file=melocoton-${version}.deb" >> $GITHUB_ENV
          mv "$rpm_file" "melocoton-${version}.rpm"
          echo "rpm_file=melocoton-${version}.rpm" >> $GITHUB_ENV
          mv "$appimage_file" "melocoton-${version}.AppImage"
          echo "appimage_file=melocoton-${version}.AppImage" >> $GITHUB_ENV

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-installers
          path: |
            melocoton-*.deb
            melocoton-*.rpm
            melocoton-*.AppImage

  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils
          curl https://mise.run | sh
          export PATH=$PATH:~/.local/bin/
          mise install
          eval "$(mise activate bash)"
          mix local.hex --force && mix local.rebar --force

      - name: build project
        run: |
          bash build.sh
          ls src-tauri/target/release/
          version="${GITHUB_REF_NAME#v}"
          deb_file=$(find src-tauri/target/release/bundle/deb/ -type f -name "*.deb")
          rpm_file=$(find src-tauri/target/release/bundle/rpm/ -type f -name "*.rpm" 2>/dev/null || true)
          appimage_file=$(find src-tauri/target/release/bundle/appimage/ -type f -name "*.AppImage" 2>/dev/null || true)
          mv "$deb_file" "melocoton-${version}-arm64.deb"
          echo "deb_file=melocoton-${version}-arm64.deb" >> $GITHUB_ENV
          if [ -n "$rpm_file" ]; then
            mv "$rpm_file" "melocoton-${version}-arm64.rpm"
            echo "rpm_file=melocoton-${version}-arm64.rpm" >> $GITHUB_ENV
          fi
          if [ -n "$appimage_file" ]; then
            mv "$appimage_file" "melocoton-${version}-arm64.AppImage"
            echo "appimage_file=melocoton-${version}-arm64.AppImage" >> $GITHUB_ENV
          fi

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm-installers
          if-no-files-found: ignore
          path: |
            melocoton-*-arm64.deb
            melocoton-*-arm64.rpm
            melocoton-*-arm64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Burrito dependencies
        run: |
          $zigVersion = Select-String -Path mise.toml -Pattern '^zig\s*=\s*"(.+)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          choco install zig --version=$zigVersion -y
          C:\msys64\usr\bin\pacman.exe -S --noconfirm xz
          echo "C:\msys64\usr\bin" >> $env:GITHUB_PATH

      - name: Prepare environment
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Build project
        shell: pwsh
        run: |
          .\build.ps1
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Copy-Item $msi.FullName -Destination "melocoton-$version.msi"
          Copy-Item $nsis.FullName -Destination "melocoton-$version-setup.exe"
          echo "msi_file=melocoton-$version.msi" >> $env:GITHUB_ENV
          echo "nsis_file=melocoton-$version-setup.exe" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installers
          path: |
            melocoton-*.msi
            melocoton-*-setup.exe

  publish-releases:
    runs-on: ubuntu-24.04
    needs: [build-macos, build-linux, build-linux-arm, build-windows]
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download macos artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-installer
          path: macos/

      - name: Download linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-installers
          path: linux/

      - name: Download linux arm artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-arm-installers
          path: linux-arm/

      - name: Download windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-installers
          path: windows/

      - name: Generate release body
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD)
          fi
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...${{ github.ref_name }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          gh release create "${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --latest \
            macos/*.dmg \
            linux/*.deb \
            linux/*.rpm \
            linux/*.AppImage \
            linux-arm/*.deb \
            linux-arm/*.rpm \
            linux-arm/*.AppImage \
            windows/*.msi \
            windows/*.exe
