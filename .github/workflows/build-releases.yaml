---
name: Build releases (test)

on:
  push:
    branches:
      - release-testing

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          curl https://mise.run | sh
          export PATH=$PATH:~/.local/bin/
          mise install
          eval "$(mise activate bash)"
          mix local.hex --force && mix local.rebar --force

      - name: build project
        run: |
          bash build.sh
          ls src-tauri/target/release/
          deb_file=$(find src-tauri/target/release/bundle/deb/ -type f -name "*.deb")
          rpm_file=$(find src-tauri/target/release/bundle/rpm/ -type f -name "*.rpm")
          appimage_file=$(find src-tauri/target/release/bundle/appimage/ -type f -name "*.AppImage")
          mv $deb_file melocoton.deb
          echo "deb_file=melocoton.deb" >> $GITHUB_ENV
          mv $rpm_file melocoton.rpm
          echo "rpm_file=melocoton.rpm" >> $GITHUB_ENV
          mv $appimage_file melocoton.AppImage
          echo "appimage_file=melocoton.AppImage" >> $GITHUB_ENV

      - name: upload deb
        uses: actions/upload-artifact@v7
        with:
          name: melocoton.deb
          path: melocoton.deb

      - name: upload rpm
        uses: actions/upload-artifact@v7
        with:
          name: melocoton.rpm
          path: melocoton.rpm

      - name: upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: melocoton.AppImage
          path: melocoton.AppImage

  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils
          curl https://mise.run | sh
          export PATH=$PATH:~/.local/bin/
          mise install
          eval "$(mise activate bash)"
          mix local.hex --force && mix local.rebar --force

      - name: build project
        run: |
          bash build.sh
          ls src-tauri/target/release/
          deb_file=$(find src-tauri/target/release/bundle/deb/ -type f -name "*.deb")
          rpm_file=$(find src-tauri/target/release/bundle/rpm/ -type f -name "*.rpm" 2>/dev/null || true)
          appimage_file=$(find src-tauri/target/release/bundle/appimage/ -type f -name "*.AppImage" 2>/dev/null || true)
          mv $deb_file melocoton-arm64.deb
          echo "deb_file=melocoton-arm64.deb" >> $GITHUB_ENV
          if [ -n "$rpm_file" ]; then
            mv $rpm_file melocoton-arm64.rpm
            echo "rpm_file=melocoton-arm64.rpm" >> $GITHUB_ENV
          fi
          if [ -n "$appimage_file" ]; then
            mv $appimage_file melocoton-arm64.AppImage
            echo "appimage_file=melocoton-arm64.AppImage" >> $GITHUB_ENV
          fi

      - name: upload arm64 deb
        uses: actions/upload-artifact@v7
        with:
          name: melocoton-arm64.deb
          if-no-files-found: ignore
          path: melocoton-arm64.deb

      - name: upload arm64 rpm
        uses: actions/upload-artifact@v7
        with:
          name: melocoton-arm64.rpm
          if-no-files-found: ignore
          path: melocoton-arm64.rpm

      - name: upload arm64 AppImage
        uses: actions/upload-artifact@v7
        with:
          name: melocoton-arm64.AppImage
          if-no-files-found: ignore
          path: melocoton-arm64.AppImage

  publish-draft:
    runs-on: ubuntu-24.04
    needs: [build-linux, build-linux-arm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download linux artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: melocoton.*
          path: linux/
          merge-multiple: true

      - name: Download linux arm artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: melocoton-arm64.*
          path: linux-arm/
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v0.29.1-test.${{ github.run_id }}
          name: "Test build v0.29.1 (${{ github.sha }})"
          body: "Test build from release-testing branch."
          draft: true
          files: |
            linux/melocoton.deb
            linux/melocoton.rpm
            linux/melocoton.AppImage
            linux-arm/melocoton-arm64.deb
            linux-arm/melocoton-arm64.rpm
            linux-arm/melocoton-arm64.AppImage


