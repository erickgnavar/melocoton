---
name: Build releases

on:
  push:
    branches: windows-release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Erlang/Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Burrito dependencies
        run: |
          choco install zig -y
          C:\msys64\usr\bin\pacman.exe -S --noconfirm xz
          echo "C:\msys64\usr\bin" >> $env:GITHUB_PATH

      - name: Prepare environment
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Build project
        shell: pwsh
        run: |
          .\build.ps1
          $msi = Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          $nsis = Get-ChildItem -Path src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Copy-Item $msi.FullName -Destination melocoton.msi
          Copy-Item $nsis.FullName -Destination melocoton-setup.exe
          echo "msi_file=melocoton.msi" >> $env:GITHUB_ENV
          echo "nsis_file=melocoton-setup.exe" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installers
          path: |
            melocoton.msi
            melocoton-setup.exe

  publish-releases:
    runs-on: ubuntu-24.04
    needs: [build-windows]
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download macos artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-installer
          path: macos/

      - name: Download linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-installers
          path: linux/

      - name: Download windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-installers
          path: windows/

      - name: Generate release body
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD)
          fi
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...${{ github.ref_name }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish artifacts as release assets
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          tag_name: ${{ github.ref_name }}
          files: |
            windows/melocoton.msi
            windows/melocoton-setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          make_latest: true
