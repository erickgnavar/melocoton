---
name: Build releases (test)

on:
  push:
    branches:
      - release-testing

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          curl https://mise.run | sh
          export PATH=$PATH:~/.local/bin/
          mise install
          eval "$(mise activate bash)"
          mix local.hex --force && mix local.rebar --force

      - name: build project
        run: |
          bash build.sh
          ls src-tauri/target/release/
          deb_file=$(find src-tauri/target/release/bundle/deb/ -type f -name "*.deb")
          rpm_file=$(find src-tauri/target/release/bundle/rpm/ -type f -name "*.rpm")
          appimage_file=$(find src-tauri/target/release/bundle/appimage/ -type f -name "*.AppImage")
          mv $deb_file melocoton.deb
          echo "deb_file=melocoton.deb" >> $GITHUB_ENV
          mv $rpm_file melocoton.rpm
          echo "rpm_file=melocoton.rpm" >> $GITHUB_ENV
          mv $appimage_file melocoton.AppImage
          echo "appimage_file=melocoton.AppImage" >> $GITHUB_ENV

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-installers
          path: |
            melocoton.deb
            melocoton.rpm
            melocoton.AppImage

  build-linux-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils
          curl https://mise.run | sh
          export PATH=$PATH:~/.local/bin/
          mise install
          eval "$(mise activate bash)"
          mix local.hex --force && mix local.rebar --force

      - name: build project
        run: |
          bash build.sh
          ls src-tauri/target/release/
          deb_file=$(find src-tauri/target/release/bundle/deb/ -type f -name "*.deb")
          rpm_file=$(find src-tauri/target/release/bundle/rpm/ -type f -name "*.rpm" 2>/dev/null || true)
          appimage_file=$(find src-tauri/target/release/bundle/appimage/ -type f -name "*.AppImage" 2>/dev/null || true)
          mv $deb_file melocoton-arm64.deb
          echo "deb_file=melocoton-arm64.deb" >> $GITHUB_ENV
          if [ -n "$rpm_file" ]; then
            mv $rpm_file melocoton-arm64.rpm
            echo "rpm_file=melocoton-arm64.rpm" >> $GITHUB_ENV
          fi
          if [ -n "$appimage_file" ]; then
            mv $appimage_file melocoton-arm64.AppImage
            echo "appimage_file=melocoton-arm64.AppImage" >> $GITHUB_ENV
          fi

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm-installers
          if-no-files-found: ignore
          path: |
            melocoton-arm64.deb
            melocoton-arm64.rpm
            melocoton-arm64.AppImage


