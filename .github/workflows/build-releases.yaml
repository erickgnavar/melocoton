---
name: Build releases

on:
  push:
    tags: "*"

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          brew install rust xz mise
          mise install
          eval "$(mise activate bash)"
          mix local.hex --force && mix local.rebar --force

      - name: build project
        run: |
          bash build.sh
          dmg_file=$(find src-tauri/target/release/bundle/dmg/ -type f -name "*.dmg")
          mv $dmg_file melocoton.dmg
          echo "dmg_file=melocoton.dmg" >> $GITHUB_ENV

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-installer
          path: ${{ env.dmg_file }}

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare environment
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          curl https://mise.run | sh
          export PATH=$PATH:~/.local/bin/
          mise install
          eval "$(mise activate bash)"
          mix local.hex --force && mix local.rebar --force

      - name: build project
        run: |
          bash build.sh
          ls src-tauri/target/release/
          deb_file=$(find src-tauri/target/release/bundle/deb/ -type f -name "*.deb")
          rpm_file=$(find src-tauri/target/release/bundle/rpm/ -type f -name "*.rpm")
          appimage_file=$(find src-tauri/target/release/bundle/appimage/ -type f -name "*.AppImage")
          mv $deb_file melocoton.deb
          echo "deb_file=melocoton.deb" >> $GITHUB_ENV
          mv $rpm_file melocoton.rpm
          echo "rpm_file=melocoton.rpm" >> $GITHUB_ENV
          mv $appimage_file melocoton.AppImage
          echo "appimage_file=melocoton.AppImage" >> $GITHUB_ENV

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-installers
          path: |
            melocoton.deb
            melocoton.rpm
            melocoton.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install mise
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://mise.run -OutFile mise-install.sh
          bash mise-install.sh
          echo "$env:USERPROFILE\.local\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Prepare environment
        shell: pwsh
        run: |
          mise install
          mise exec -- mix local.hex --force
          mise exec -- mix local.rebar --force

      - name: Build project
        shell: pwsh
        run: |
          mise exec -- mix deps.get
          Remove-Item -Recurse -Force _build/prod -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force burrito_out -ErrorAction SilentlyContinue
          npm install --prefix assets
          $env:MIX_ENV = "prod"
          mise exec -- mix assets.deploy
          $env:BURRITO_TARGET = "windows"
          mise exec -- mix release
          Copy-Item burrito_out\melocoton_windows.exe src-tauri\binaries\webserver.exe
          Set-Location src-tauri
          npm install
          npx tauri build

      - name: Collect artifacts
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Recurse src-tauri\target\release\bundle\msi\*.msi | Select-Object -First 1
          $nsis = Get-ChildItem -Recurse src-tauri\target\release\bundle\nsis\*.exe | Select-Object -First 1
          Copy-Item $msi.FullName melocoton.msi
          Copy-Item $nsis.FullName melocoton-setup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-installers
          path: |
            melocoton.msi
            melocoton-setup.exe

  publish-releases:
    runs-on: ubuntu-24.04
    needs: [build-macos, build-linux, build-windows]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download macos artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-installer
          path: macos/

      - name: Download linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: linux-installers
          path: linux/

      - name: Download windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-installers
          path: windows/

      - name: Generate release body
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG"..HEAD)
          fi
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...${{ github.ref_name }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish artifacts as release assets
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          tag_name: ${{ github.ref_name }}
          files: |
            macos/melocoton.dmg
            linux/melocoton.deb
            linux/melocoton.rpm
            linux/melocoton.AppImage
            windows/melocoton.msi
            windows/melocoton-setup.exe
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
          draft: false
          make_latest: true
